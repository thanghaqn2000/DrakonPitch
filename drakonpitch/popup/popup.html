<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drakon Pitch</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 280px;
        font-family: Arial, sans-serif;
        background: #111;
        color: #f1f1f1;
      }
      .logo {
        display: block;
        width: 72px;
        height: auto;
        margin: 0 auto 10px;
      }
      .title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 8px;
        text-align: center;
      }
      .desc {
        font-size: 13px;
        line-height: 1.4;
        opacity: 0.9;
      }
      .ok {
        margin-top: 10px;
        font-size: 12px;
        color: #79e285;
      }
      .btn {
        margin-top: 10px;
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
        background: #2b6ef3;
        color: #fff;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="../assets/drakon-logo-offcial.png" alt="DrakonPitch" />
    <div class="title">Drakon Pitch</div>
    <div class="desc">
      Extension này hoạt động trực tiếp trên trang YouTube.<br />
      Mở 1 video YouTube để thấy thanh chỉnh tone.
    </div>
    <button id="injectBtn" class="btn">Inject ngay vào tab hiện tại</button>
    <div id="status" class="ok">Đang kiểm tra tab hiện tại...</div>
    <script src="popup.js"></script>
  </body>
</html>
