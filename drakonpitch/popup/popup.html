<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DrakonPitch</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 252px;
        padding: 8px 10px 7px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        background: linear-gradient(165deg, #0a1628 0%, #0d1324 45%, #080c14 100%);
        color: #e8eef8;
        border: 1px solid rgba(56, 189, 248, 0.12);
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 8px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .logo-wrap {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        border-radius: 8px;
        border: 1px solid rgba(56, 189, 248, 0.28);
        background: #0a0f18;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 42%;
        transform: scale(1.22);
        transform-origin: 50% 42%;
      }

      .title {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #38bdf8;
        line-height: 1.15;
      }

      .subtitle {
        font-size: 7px;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: rgba(232, 238, 248, 0.65);
        margin-top: 1px;
      }

      .wasm-badge {
        flex-shrink: 0;
        font-size: 7px;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 4px 7px;
        border-radius: 999px;
        border: 1px solid rgba(34, 197, 94, 0.45);
        background: rgba(34, 197, 94, 0.12);
        color: #4ade80;
        white-space: nowrap;
      }

      .top-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .lang-switch {
        position: relative;
        flex-shrink: 0;
      }

      .lang-btn {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 1px solid rgba(56, 189, 248, 0.34);
        background: rgba(9, 14, 28, 0.85);
        color: #7dd3fc;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .lang-btn:hover {
        border-color: rgba(56, 189, 248, 0.62);
      }

      .lang-btn svg {
        width: 14px;
        height: 14px;
      }

      .lang-menu {
        position: absolute;
        top: 32px;
        right: 0;
        min-width: 110px;
        border-radius: 8px;
        border: 1px solid rgba(56, 189, 248, 0.3);
        background: rgba(7, 14, 28, 0.97);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
        overflow: hidden;
        z-index: 25;
      }

      .lang-menu.hidden {
        display: none;
      }

      .lang-option {
        width: 100%;
        border: 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        background: transparent;
        color: #e2e8f0;
        font-family: inherit;
        font-size: 10px;
        font-weight: 700;
        text-align: left;
        padding: 7px 9px;
        cursor: pointer;
      }

      .lang-option:last-child {
        border-bottom: 0;
      }

      .lang-option:hover,
      .lang-option.active {
        background: rgba(56, 189, 248, 0.16);
        color: #f8fafc;
      }

      .wasm-badge.standby {
        border-color: rgba(148, 163, 184, 0.35);
        background: rgba(148, 163, 184, 0.08);
        color: #94a3b8;
      }

      .wasm-badge.warn {
        border-color: rgba(251, 191, 36, 0.45);
        background: rgba(251, 191, 36, 0.1);
        color: #fbbf24;
      }

      .pitch-panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 7px 9px;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.55);
        border: 1px solid rgba(56, 189, 248, 0.15);
        margin-bottom: 7px;
      }

      .current-label {
        font-size: 7px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: rgba(148, 163, 184, 0.85);
        line-height: 1.35;
        max-width: 72px;
      }

      .pitch-big {
        font-weight: 800;
        line-height: 1;
        color: #f8fafc;
        text-align: right;
        flex: 1;
        min-width: 0;
      }

      #pitchMain {
        font-size: 26px;
        letter-spacing: -0.03em;
      }

      .pitch-st {
        font-size: 11px;
        font-weight: 600;
        color: rgba(148, 163, 184, 0.9);
        margin-left: 2px;
      }

      .control-panel {
        padding: 8px 8px 7px;
        border-radius: 10px;
        background: rgba(8, 12, 22, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.06);
        margin-bottom: 7px;
      }

      .pitch-slider {
        appearance: none;
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 4px;
        background: linear-gradient(90deg, #1e293b 0%, #334155 50%, #1e293b 100%);
        outline: none;
        cursor: pointer;
        margin-bottom: 5px;
      }

      .pitch-slider:focus-visible {
        outline: 2px solid #7dd3fc;
        outline-offset: 3px;
        box-shadow: 0 0 0 1px rgba(10, 22, 40, 0.95);
      }

      .pitch-slider:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .pitch-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #7dd3fc, #0ea5e9);
        box-shadow: 0 0 8px rgba(14, 165, 233, 0.55), 0 1px 4px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.4);
        cursor: grab;
      }

      .pitch-slider::-webkit-slider-thumb:active {
        cursor: grabbing;
      }

      .scale {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 7px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: rgba(148, 163, 184, 0.75);
        margin-bottom: 6px;
        padding: 0 1px;
      }

      .scale .original {
        color: #38bdf8;
        letter-spacing: 0.08em;
      }

      .nudge-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
      }

      .nudge-row button {
        font-family: inherit;
        font-size: 9px;
        font-weight: 700;
        padding: 5px 2px;
        border-radius: 6px;
        border: 1px solid rgba(56, 189, 248, 0.22);
        background: rgba(15, 23, 42, 0.8);
        color: #e2e8f0;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      .nudge-row button:hover:not(:disabled) {
        background: rgba(56, 189, 248, 0.12);
        border-color: rgba(56, 189, 248, 0.4);
      }

      .nudge-row button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-reset-engine {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        width: 100%;
        font-family: inherit;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.1em;
        padding: 7px 8px;
        border-radius: 8px;
        border: 1px solid rgba(56, 189, 248, 0.28);
        background: linear-gradient(180deg, rgba(30, 58, 95, 0.5) 0%, rgba(15, 23, 42, 0.9) 100%);
        color: #f1f5f9;
        cursor: pointer;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .btn-reset-engine:hover:not(:disabled) {
        border-color: rgba(56, 189, 248, 0.5);
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.2);
      }

      .btn-reset-engine:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-reset-engine svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
      }

      .btn-download {
        margin-top: 6px;
        width: 100%;
        font-family: inherit;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.1em;
        padding: 7px 8px;
        border-radius: 8px;
        border: 1px solid rgba(34, 197, 94, 0.42);
        background: linear-gradient(180deg, rgba(20, 83, 45, 0.52) 0%, rgba(13, 48, 29, 0.9) 100%);
        color: #ecfdf5;
        cursor: pointer;
      }

      .btn-download:hover:not(:disabled) {
        border-color: rgba(34, 197, 94, 0.62);
      }

      .btn-download:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }


      .export-overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20;
        padding: 12px;
      }

      .export-overlay.hidden {
        display: none;
      }

      .export-overlay-card {
        width: 100%;
        border-radius: 18px;
        border: 1px solid rgba(56, 189, 248, 0.3);
        background: rgba(7, 16, 36, 0.98);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        padding: 16px 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .export-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .export-top-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .export-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #ef4444;
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
      }

      .export-title {
        font-size: 10px;
        font-weight: 800;
        color: #22d3ee;
        letter-spacing: 0.02em;
      }

      .export-percent {
        font-size: 38px;
        line-height: 1;
        font-weight: 800;
        color: #f8fafc;
      }

      .export-note {
        border-left: 3px solid rgba(34, 211, 238, 0.65);
        padding-left: 9px;
        font-size: 9px;
        line-height: 1.45;
        font-weight: 700;
        color: rgba(226, 232, 240, 0.9);
      }

      .export-progress-track {
        width: 100%;
        height: 11px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.22);
        overflow: hidden;
      }

      .export-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #22d3ee 0%, #60a5fa 55%, #818cf8 100%);
        transition: width 0.25s ease-out;
      }

      .export-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 9px;
        line-height: 1;
        font-weight: 700;
        color: rgba(148, 163, 184, 0.95);
      }

      .export-cancel {
        margin-top: 4px;
        width: 100%;
        font-family: inherit;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.05em;
        padding: 10px 10px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(8, 16, 35, 0.8);
        color: #94a3b8;
        cursor: pointer;
      }

      .export-cancel:hover:not(:disabled) {
        border-color: rgba(148, 163, 184, 0.55);
        color: #cbd5e1;
      }

      .export-cancel:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

    </style>
  </head>
  <body>
    <header class="top">
      <div class="brand">
        <div class="logo-wrap" aria-hidden="true">
          <img src="../assets/drakonpi-logo.png" alt="" />
        </div>
        <div>
          <div class="title">DrakonPitch</div>
        </div>
      </div>
      <div class="top-right">
        <div id="wasmBadge" class="wasm-badge standby">● STANDBY</div>
        <div class="lang-switch">
          <button type="button" id="langBtn" class="lang-btn" aria-label="Language">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M3 12h18"></path>
              <path d="M12 3a15 15 0 0 1 0 18"></path>
              <path d="M12 3a15 15 0 0 0 0 18"></path>
            </svg>
          </button>
          <div id="langMenu" class="lang-menu hidden">
            <button type="button" class="lang-option" data-lang="en" data-i18n="lang_english">English</button>
            <button type="button" class="lang-option" data-lang="vi" data-i18n="lang_vietnamese">Tiếng Việt</button>
            <button type="button" class="lang-option" data-lang="ja" data-i18n="lang_japanese">日本語</button>
          </div>
        </div>
      </div>
    </header>

    <section class="pitch-panel">
      <div id="pitchLabel" class="current-label" data-i18n="current_pitch">CURRENT PITCH</div>
      <div class="pitch-big">
        <span id="pitchMain">0.0</span><span id="pitchUnit" class="pitch-st">st</span>
      </div>
    </section>

    <section class="control-panel">
      <input
        id="pitchSlider"
        class="pitch-slider"
        type="range"
        min="-6"
        max="6"
        step="0.5"
        value="0"
        aria-labelledby="pitchLabel pitchMain pitchUnit"
      />
      <div class="scale">
        <span data-i18n="scale_min">-6 ST</span>
        <span class="original" data-i18n="scale_original">ORIGINAL</span>
        <span data-i18n="scale_max">+6 ST</span>
      </div>
      <div class="nudge-row">
        <button type="button" class="nudge" data-delta="-1" title="-1 semitone">[-1]</button>
        <button type="button" class="nudge" data-delta="-0.5" title="-0.5 semitone">[-0.5]</button>
        <button type="button" class="nudge" data-delta="0.5" title="+0.5 semitone">[+0.5]</button>
        <button type="button" class="nudge" data-delta="1" title="+1 semitone">[+1]</button>
      </div>
    </section>

    <button type="button" id="resetBtn" class="btn-reset-engine">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 3-7.1" />
        <path d="M3 3v6h6" />
      </svg>
      <span data-i18n="reset_engine">RESET ENGINE</span>
    </button>
    <button type="button" id="downloadBtn" class="btn-download" data-i18n="export_mp3">EXPORT MP3</button>

    <div id="exportOverlay" class="export-overlay hidden" aria-live="polite" aria-hidden="true">
      <div class="export-overlay-card">
        <div class="export-top">
          <div class="export-top-left">
            <span class="export-dot" aria-hidden="true"></span>
            <div class="export-title" data-i18n="exporting_mp3">EXPORTING MP3</div>
          </div>
          <div id="exportPercent" class="export-percent">0%</div>
        </div>
        <div id="exportText" class="export-note" data-i18n="export_overlay_text" lang="en">Exporting MP3. Please watch the full video and do not seek.</div>
        <div class="export-progress-track">
          <div id="exportProgressFill" class="export-progress-fill"></div>
        </div>
        <div class="export-meta">
          <div id="exportEta">~00:00 LEFT</div>
          <div data-i18n="export_quality">320KBPS HQ</div>
        </div>
        <button type="button" id="cancelExportBtn" class="export-cancel" data-i18n="cancel_export">CANCEL EXPORT</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
