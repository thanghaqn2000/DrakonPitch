<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DrakonPitch</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 252px;
        padding: 8px 10px 7px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        background: linear-gradient(165deg, #0a1628 0%, #0d1324 45%, #080c14 100%);
        color: #e8eef8;
        border: 1px solid rgba(56, 189, 248, 0.12);
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 8px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .logo-wrap {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        border-radius: 8px;
        border: 1px solid rgba(56, 189, 248, 0.28);
        background: #0a0f18;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 42%;
        transform: scale(1.22);
        transform-origin: 50% 42%;
      }

      .title {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #38bdf8;
        line-height: 1.15;
      }

      .subtitle {
        font-size: 7px;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: rgba(232, 238, 248, 0.65);
        margin-top: 1px;
      }

      .wasm-badge {
        flex-shrink: 0;
        font-size: 7px;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 4px 7px;
        border-radius: 999px;
        border: 1px solid rgba(34, 197, 94, 0.45);
        background: rgba(34, 197, 94, 0.12);
        color: #4ade80;
        white-space: nowrap;
      }

      .wasm-badge.standby {
        border-color: rgba(148, 163, 184, 0.35);
        background: rgba(148, 163, 184, 0.08);
        color: #94a3b8;
      }

      .wasm-badge.warn {
        border-color: rgba(251, 191, 36, 0.45);
        background: rgba(251, 191, 36, 0.1);
        color: #fbbf24;
      }

      .pitch-panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 7px 9px;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.55);
        border: 1px solid rgba(56, 189, 248, 0.15);
        margin-bottom: 7px;
      }

      .current-label {
        font-size: 7px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: rgba(148, 163, 184, 0.85);
        line-height: 1.35;
        max-width: 72px;
      }

      .pitch-big {
        font-weight: 800;
        line-height: 1;
        color: #f8fafc;
        text-align: right;
        flex: 1;
        min-width: 0;
      }

      #pitchMain {
        font-size: 26px;
        letter-spacing: -0.03em;
      }

      .pitch-st {
        font-size: 11px;
        font-weight: 600;
        color: rgba(148, 163, 184, 0.9);
        margin-left: 2px;
      }

      .control-panel {
        padding: 8px 8px 7px;
        border-radius: 10px;
        background: rgba(8, 12, 22, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.06);
        margin-bottom: 7px;
      }

      .pitch-slider {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 4px;
        background: linear-gradient(90deg, #1e293b 0%, #334155 50%, #1e293b 100%);
        outline: none;
        cursor: pointer;
        margin-bottom: 5px;
      }

      .pitch-slider:focus-visible {
        outline: 2px solid #7dd3fc;
        outline-offset: 3px;
        box-shadow: 0 0 0 1px rgba(10, 22, 40, 0.95);
      }

      .pitch-slider:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .pitch-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #7dd3fc, #0ea5e9);
        box-shadow: 0 0 8px rgba(14, 165, 233, 0.55), 0 1px 4px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.4);
        cursor: grab;
      }

      .pitch-slider::-webkit-slider-thumb:active {
        cursor: grabbing;
      }

      .scale {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 7px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: rgba(148, 163, 184, 0.75);
        margin-bottom: 6px;
        padding: 0 1px;
      }

      .scale .original {
        color: #38bdf8;
        letter-spacing: 0.08em;
      }

      .nudge-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
      }

      .nudge-row button {
        font-family: inherit;
        font-size: 9px;
        font-weight: 700;
        padding: 5px 2px;
        border-radius: 6px;
        border: 1px solid rgba(56, 189, 248, 0.22);
        background: rgba(15, 23, 42, 0.8);
        color: #e2e8f0;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      .nudge-row button:hover:not(:disabled) {
        background: rgba(56, 189, 248, 0.12);
        border-color: rgba(56, 189, 248, 0.4);
      }

      .nudge-row button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-reset-engine {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        width: 100%;
        font-family: inherit;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.1em;
        padding: 7px 8px;
        border-radius: 8px;
        border: 1px solid rgba(56, 189, 248, 0.28);
        background: linear-gradient(180deg, rgba(30, 58, 95, 0.5) 0%, rgba(15, 23, 42, 0.9) 100%);
        color: #f1f5f9;
        cursor: pointer;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .btn-reset-engine:hover:not(:disabled) {
        border-color: rgba(56, 189, 248, 0.5);
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.2);
      }

      .btn-reset-engine:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-reset-engine svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
      }

    </style>
  </head>
  <body>
    <header class="top">
      <div class="brand">
        <div class="logo-wrap" aria-hidden="true">
          <img src="../assets/drakonpi-logo.png" alt="" />
        </div>
        <div>
          <div class="title">DrakonPitch</div>
        </div>
      </div>
      <div id="wasmBadge" class="wasm-badge standby">● STANDBY</div>
    </header>

    <section class="pitch-panel">
      <div id="pitchLabel" class="current-label">CURRENT PITCH</div>
      <div class="pitch-big">
        <span id="pitchMain">0.0</span><span id="pitchUnit" class="pitch-st">st</span>
      </div>
    </section>

    <section class="control-panel">
      <input
        id="pitchSlider"
        class="pitch-slider"
        type="range"
        min="-6"
        max="6"
        step="0.5"
        value="0"
        aria-labelledby="pitchLabel pitchMain pitchUnit"
      />
      <div class="scale">
        <span>-6 ST</span>
        <span class="original">ORIGINAL</span>
        <span>+6 ST</span>
      </div>
      <div class="nudge-row">
        <button type="button" class="nudge" data-delta="-1" title="-1 semitone">[-1]</button>
        <button type="button" class="nudge" data-delta="-0.5" title="-0.5 semitone">[-0.5]</button>
        <button type="button" class="nudge" data-delta="0.5" title="+0.5 semitone">[+0.5]</button>
        <button type="button" class="nudge" data-delta="1" title="+1 semitone">[+1]</button>
      </div>
    </section>

    <button type="button" id="resetBtn" class="btn-reset-engine">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 3-7.1" />
        <path d="M3 3v6h6" />
      </svg>
      RESET ENGINE
    </button>

    <script src="popup.js"></script>
  </body>
</html>
